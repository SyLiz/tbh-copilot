name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Engine test suite
        run: node engine/test.cjs
      - name: Dashboard smoke + i18n coverage + cache-buster guard
        run: node engine/smoke.cjs
